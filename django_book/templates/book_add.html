{% extends 'home.html' %}


{% block content %}
   <h2 class="text-center">添加图书</h2>
    <form action="" method="post">
    <p>书名：<input type="text" name="title" class="form-control"> </p>
    <p>价格：<input type="text" name="price" class="form-control"> </p>
    <p>出版时间：<input type="date" name="publish_date" class="form-control"> </p>
    <p>出版社：<select name="publish">
                {% for publish_obj in publish_queryset %}
                    <option value="{{ publish_obj.pk }}">{{ publish_obj.name }}</option>
                
                {% endfor %}
                
              </select>

    </p>
    <p>作者：
        {% for author_obj in author_queryset %}
            <input type="checkbox" name="author" value="{{ author_obj.pk }}">{{ author_obj.name }}
        
        {% endfor %}
        
         
    </p>
    <input type="submit" class="btn btn-success" value="提交">


    </form>
{% endblock %}

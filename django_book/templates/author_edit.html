 {% extends 'home.html' %}
 {% block content %}
 <h2 class="text-center">编辑作者</h2>
 <form action="" method="post">
 <p>姓名：<input type="text" name="name" value="{{ author_obj.name }}"
class="form-control"></p>
 <p>年龄：<input type="text" name="age" value="{{ author_obj.age }}"
class="form-control"></p>
 <p>联系方式：<input type="text" value="{{ author_obj.authordetail.phone}}" name="phone" class="form-control"></p>
 <p>地址：<input type="text" name="addr" value="{{author_obj.authordetail.addr }}" class="form-control"></p>
 <input type="submit" class="btn btn-success" value="提交">
 </form>
 {% endblock %}

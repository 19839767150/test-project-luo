 {% extends 'home.html' %}
 {% block content %}
 <h1 class="text-center">出版社列表</h1>
 <a href="{% url 'publish_add' %}" class="btn btn-success pull-left">添加出版社</a>
 <table class="table table-hover table-striped">
 <thead>    <tr>
                <th>ID</th>
                <th>名称</th>
                <th>地址</th>
                <th>邮箱</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for publish_query in publish_queryset %}
                <tr>
                    <td>{{ publish_query.pk }}</td>
                    <td>{{ publish_query.name }}</td>
                    <td>{{ publish_query.address }}</td>
                    <td>{{ publish_query.email }}</td>
                    <td>
                        <a href="{% url 'publish_edit' publish_id=publish_query.pk %}" class="btn btn-primary btn-xs">编辑</a>
                        <a href="{% url 'publish_delete' delete_id=publish_query.pk %}" class="btn btn-danger  btn-xs">删除</a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
 {% endblock %}
